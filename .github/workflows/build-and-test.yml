name: CMake on multiple platforms with Conan and multiple compilers

name: CMake on multiple platforms with Conan and multiple compilers

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:

          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++


          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
        exclude:

          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Install Python and Conan
      run: |
        pip install --upgrade pip
        pip install conan

    - name: Configure Conan profile
      run: |

        conan profile detect --force

 #       echo "settings.compiler.cppstd=17" >> ~/.conan2/profiles/default
 #       echo "settings.compiler.libcxx=libstdc++11" >> ~/.conan2/profiles/default

    - name: Install dependencies with Conan
      run: >
        conan install . --build=missing
        -s build_type=${{ matrix.build_type }}
        -if build/conan
      env:
        CONAN_SYSREQUIRES_MODE: enabled

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
